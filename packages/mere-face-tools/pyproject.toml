[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mere-face-tools"
version = "0.1.0"
description = "Local face-library indexing, search, and review workflows for mere.run"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "Sawfwair Inc. and mere.run contributors" }
]
dependencies = [
  "Pillow>=10",
]

[project.scripts]
mere-face-tools = "mere_face_tools.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mere_face_tools = ["py.typed"]
