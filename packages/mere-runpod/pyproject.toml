[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mere-runpod"
version = "0.1.0"
description = "RunPod companion plugin for mere.run workflows"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "Sawfwair Inc. and mere.run contributors" }
]
dependencies = []

[project.scripts]
mere-runpod = "mere_runpod.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mere_runpod = ["recipes/*.json"]
