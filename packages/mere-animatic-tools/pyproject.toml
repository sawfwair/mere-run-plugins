[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mere-animatic-tools"
version = "0.1.0"
description = "Local animatic production companion tools for mere.run"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "Sawfwair Inc. and mere.run contributors" }
]
dependencies = [
  "Pillow>=10",
]

[project.scripts]
mere-animatic-tools = "mere_animatic_tools.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
